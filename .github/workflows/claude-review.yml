name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    # Security:
    # - pull_request: only auto-review PRs opened from within this repo (not forks),
    #   preventing compute abuse from external contributors.
    # - issue_comment / pull_request_review_comment: only respond to @claude from
    #   trusted roles (owner, member, collaborator) to prevent secret theft via
    #   issue_comment, which always runs with full repo secrets regardless of fork.
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the Xui cross-platform UI framework (C# / .NET).
            Focus on:
            - Correctness of layer struct mutation (fields vs properties, ref semantics)
            - Public API surface — breaking changes to packaged libraries
            - Platform-specific guards (#if WINDOWS / MACOS / etc.)
            - Any accidental introduction of external dependencies into Xui.Core (it must remain dependency-free)
            - General code quality, naming, and consistency with the existing codebase style
