name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the Xui cross-platform UI framework (C# / .NET).
            Focus on:
            - Correctness of layer struct mutation (fields vs properties, ref semantics)
            - Public API surface — breaking changes to packaged libraries
            - Platform-specific guards (#if WINDOWS / MACOS / etc.)
            - Any accidental introduction of external dependencies into Xui.Core (it must remain dependency-free)
            - General code quality, naming, and consistency with the existing codebase style
