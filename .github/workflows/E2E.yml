name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      windows:
        description: 'Windows'
        type: boolean
        default: true
      macos:
        description: 'macOS'
        type: boolean
        default: false

jobs:
  e2e-windows:
    if: inputs.windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run E2E Tests
      run: dotnet test Xui/Tests/E2E/Xui.Tests.E2E.csproj --verbosity normal

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-logs-windows
        path: Xui/Tests/E2E/TestApp/TestResults/

  e2e-macos:
    if: inputs.macos
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run E2E Tests
      run: dotnet test Xui/Tests/E2E/Xui.Tests.E2E.csproj --verbosity normal

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-logs-macos
        path: Xui/Tests/E2E/TestApp/TestResults/
