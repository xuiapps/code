<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect x="180" y="24" width="420" height="376" fill="#F0F0F0" />
  <text x="3" y="27" fill="#000000" text-anchor="start" dominant-baseline="text-before-edge" font-size="15" font-family="Inter" xml:space="preserve">Number Input</text>
  <text x="3" y="51.15" fill="#000000" text-anchor="start" dominant-baseline="text-before-edge" font-size="15" font-family="Inter" xml:space="preserve">Pattern Input</text>
  <text x="3" y="75.3" fill="#000000" text-anchor="start" dominant-baseline="text-before-edge" font-size="15" font-family="Inter" xml:space="preserve">Currency Input</text>
  <text x="184" y="28" fill="#000000" text-anchor="start" dominant-baseline="text-before-edge" font-size="15" font-family="Inter" xml:space="preserve">USD (default $):</text>
  <rect x="185" y="55.15" width="410" height="8" fill="#FFFFFF" />
  <rect x="184.5" y="54.65" width="411" height="9" fill="none" stroke="#0000FF" />
  <rect x="189" y="57.15" width="0" height="4" fill="#0000FF" />
