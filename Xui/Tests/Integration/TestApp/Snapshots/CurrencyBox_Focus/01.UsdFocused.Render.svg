  <text x="184" y="160.45" fill="#000000" text-anchor="start" dominant-baseline="text-before-edge" font-size="15" font-family="Inter" xml:space="preserve">Zero:</text>
  <rect x="185" y="187.6" width="410" height="8" fill="#FFFFFF" />
