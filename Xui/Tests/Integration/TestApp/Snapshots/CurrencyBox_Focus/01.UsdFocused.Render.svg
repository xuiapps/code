  <text x="184" y="72.15" fill="#000000" text-anchor="start" dominant-baseline="text-before-edge" font-size="15" font-family="Inter" xml:space="preserve">EUR (suffix):</text>
  <rect x="185" y="99.3" width="410" height="8" fill="#FFFFFF" />
