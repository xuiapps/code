  <text x="184" y="116.3" fill="#000000" text-anchor="start" dominant-baseline="text-before-edge" font-size="15" font-family="Inter" xml:space="preserve">Large value (overflow hint):</text>
  <rect x="185" y="143.45" width="410" height="8" fill="#FFFFFF" />
  <rect x="184.5" y="142.95" width="411" height="9" fill="none" stroke="#808080" />
